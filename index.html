<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welling United Red Attendance</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <img class="club-logo" src="Welling-Logo.jpg" alt="Welling United logo" onerror="this.style.display='none'" />
    <div>
      <p class="eyebrow">Welling United Red OBDSFL</p>
      <h1>Attendance</h1>
    </div>
  </header>

  <main class="app-shell">
    <section class="card session-card" aria-labelledby="session-title">
      <h2 id="session-title">Session type</h2>

      <fieldset class="radio-options">
        <legend class="sr-only">Session type</legend>

        <label class="radio-card">
          <input type="radio" name="session-type" value="Training" checked />
          <span>Training</span>
        </label>

        <label class="radio-card">
          <input type="radio" name="session-type" value="Match" />
          <span>Match</span>
        </label>
      </fieldset>

      <fieldset id="match-venue-options" class="radio-options venue-options hidden">
        <legend>Match venue</legend>

        <label class="radio-card">
          <input type="radio" name="match-venue" value="Home" checked />
          <span>Home</span>
        </label>

        <label class="radio-card">
          <input type="radio" name="match-venue" value="Away" />
          <span>Away</span>
        </label>
      </fieldset>
    </section>

    <section class="summary-bar" aria-live="polite">
      <span id="summary-total">0 players</span>
      <span id="summary-present">0 present</span>
      <span id="summary-missing">0 missing</span>
    </section>

    <section class="player-list" id="player-list" aria-label="Player attendance list">
      <!-- Player cards are created by app.js -->
    </section>

    <section class="actions">
      <button id="export-json" class="primary-button">Submit</button>
      <button id="clear-session" class="danger-button">Clear</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
